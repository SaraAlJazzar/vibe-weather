name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: app/requirements.txt

      - run: pip install -r app/requirements.txt

      - name: Verify app starts
        run: |
          cd app && timeout 5 python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/api/health
        env:
          OPENWEATHER_API_KEY: test

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # BuildKit + layer caching via GitHub Actions cache
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          DOCKER_HOST: unix:///home/saraaljazzar/.docker/desktop/docker.sock
        run: |
          set -e
          APP_IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/vibe-weather:latest"
          export OPENWEATHER_API_KEY APP_IMAGE
          mkdir -p /tmp/docker-ghcr
          echo "${{ secrets.GHCR_TOKEN }}" | DOCKER_CONFIG=/tmp/docker-ghcr docker login ghcr.io -u ${{ github.actor }} --password-stdin
          DOCKER_CONFIG=/tmp/docker-ghcr docker compose -f docker-compose.prod.yml pull
          DOCKER_CONFIG=/tmp/docker-ghcr docker compose -f docker-compose.prod.yml up -d --scale app=2 --remove-orphans
          DOCKER_CONFIG=/tmp/docker-ghcr docker image prune -f

      - name: Verify deployment through Nginx
        run: |
          sleep 8
          curl -sf http://localhost/api/health
          curl -sf http://localhost/ | head -c 100
