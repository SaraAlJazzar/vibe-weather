name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: app/requirements.txt

      - run: pip install -r app/requirements.txt

      - name: Verify app starts
        run: |
          cd app && timeout 5 python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/api/health
        env:
          OPENWEATHER_API_KEY: test

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # BuildKit + layer caching via GitHub Actions cache
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync configs and deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          APP_IMAGE: ghcr.io/${{ github.repository }}:latest
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,OPENWEATHER_API_KEY,APP_IMAGE,REPO
          script: |
            set -e
            APP_DIR="/opt/vibe-weather"
            mkdir -p "$APP_DIR/nginx/conf.d"

            # Sync nginx configs (reverse proxy) from repo
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/main/nginx/nginx.conf" \
              -o "$APP_DIR/nginx/nginx.conf"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/main/nginx/conf.d/default.conf" \
              -o "$APP_DIR/nginx/conf.d/default.conf"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/main/docker-compose.prod.yml" \
              -o "$APP_DIR/docker-compose.prod.yml"

            cd "$APP_DIR"
            export OPENWEATHER_API_KEY APP_IMAGE

            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --scale app=2 --remove-orphans
            docker image prune -f

      - name: Verify deployment through Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 8
            curl -sf http://localhost/api/health
            curl -sf http://localhost/api/network/concepts | head -c 200
