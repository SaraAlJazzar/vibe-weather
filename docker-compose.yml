# Advanced Docker Compose — networking, logging, volumes, load balancing
# Run: docker compose up --build --scale app=2

name: vibe-weather

services:
  # ── Edge / Reverse Proxy (public subnet analogy) ──────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"       # HTTP  — public IP:80 → container:80 (NAT/port mapping)
      - "443:443"     # HTTPS — enable when TLS certs are mounted
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx          # storage: named volume for logs
      - cert_data:/etc/nginx/certs:ro      # TLS certs (Let's Encrypt / certbot)
    networks:
      - edge_net                            # faces the "public" (host)
      - backend_net                         # reaches private app backends
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging: &default-logging
      driver: json-file                     # logging driver with rotation
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,environment"
    labels:
      service: nginx
      tier: edge

  # ── Application backends (private subnet analogy) ─────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    expose:
      - "8000"                              # NOT published — only nginx reaches this port
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    networks:
      - backend_net                         # private network — no direct host port
    volumes:
      - app_cache:/app/.cache               # storage: persistent cache volume
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    labels:
      service: app
      tier: backend
    cap_add:
      - NET_RAW                    # allow ICMP ping from container
    # Scale replicas for load balancing: docker compose up --scale app=2
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

# ── Docker Networking Deep Dive ───────────────────────────────────
networks:
  edge_net:
    driver: bridge
    name: vibe_edge
    ipam:
      config:
        - subnet: 172.28.0.0/24            # custom CIDR — private IP range
  backend_net:
    driver: bridge
    name: vibe_backend
    ipam:
      config:
        - subnet: 172.29.0.0/24            # isolated backend subnet
    # Note: NOT internal:true — apps need NAT egress to reach OpenWeatherMap API
    # In AWS VPC analogy: this subnet uses a NAT Gateway for outbound internet

# ── Storage Internals — named volumes ───────────────────────────────
volumes:
  nginx_logs:
    name: vibe_nginx_logs
  app_cache:
    name: vibe_app_cache
  cert_data:
    name: vibe_cert_data
