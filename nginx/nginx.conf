# Nginx reverse proxy + load balancer
# Terminates HTTP/HTTPS (L7) and forwards to Python app replicas via TCP (L4)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;          # efficient TCP event notification on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;     # disable Nagle — lower latency for HTTP (TCP)
    keepalive_timeout 65;

    # Gzip for HTTP response compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Docker embedded DNS — resolves scaled service names
    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/conf.d/*.conf;
}
