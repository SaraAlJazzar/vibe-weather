# Upstream load balancer — least_conn distributes across app replicas
# Docker DNS returns all container IPs for the "app" service when scaled

upstream weather_backend {
    least_conn;
    zone weather_backend 64k;
    server app:8000 resolve;
    keepalive 32;
}

# HTTP — redirect to HTTPS in production (optional, see ssl.conf)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (used by CI/CD and load balancers)
    location /api/health {
        proxy_pass http://weather_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://weather_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;        # client public/private IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;     # http or https
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Show which backend replica handled the request
        add_header X-Backend $upstream_addr always;
    }
}

