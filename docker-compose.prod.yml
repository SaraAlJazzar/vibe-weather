# Production compose — pulls pre-built image from Docker Registry (ghcr.io)
# Deployed by CI/CD on push to main

name: vibe-weather

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - cert_data:/etc/nginx/certs:ro
    networks:
      - edge_net
      - backend_net
    depends_on:
      app:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app:
    image: ${APP_IMAGE:-ghcr.io/your-username/vibe-weather:latest}
    expose:
      - "8000"
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    networks:
      - backend_net
    volumes:
      - app_cache:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always
    pull_policy: always
    cap_add:
      - NET_RAW
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  edge_net:
    driver: bridge
    name: vibe_edge
  backend_net:
    driver: bridge
    name: vibe_backend

volumes:
  nginx_logs:
  app_cache:
  cert_data:
